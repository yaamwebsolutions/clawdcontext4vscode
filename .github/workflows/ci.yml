name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: ["20", "22"]
        include:
          - os: macos-latest
            node: "22"
          - os: windows-latest
            node: "22"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Smoke test
        run: npm test

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        uses: actions/upload-artifact@v6
        with:
          name: clawdcontext-vsix
          path: "*.vsix"
          if-no-files-found: error
