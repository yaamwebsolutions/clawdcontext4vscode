name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Compile, lint, and test
        run: npm run check

      - name: Build and package
        run: npm run package:ci

      - name: Resolve VSIX filename
        id: vsix
        run: |
          FILE=$(ls -1 *.vsix | head -n 1)
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.file }}
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/') && env.VSCE_PAT != ''
        run: npx @vscode/vsce publish --packagePath "${{ steps.vsix.outputs.file }}" -p "$VSCE_PAT" --no-yarn

      - name: Publish to Open VSX
        if: startsWith(github.ref, 'refs/tags/') && env.OVSX_PAT != ''
        run: npx ovsx publish "${{ steps.vsix.outputs.file }}" -p "$OVSX_PAT"
