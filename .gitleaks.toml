title = "ClawdContext gitleaks config"

[allowlist]
description = "Allow placeholder examples and generated metadata that are not secrets"
paths = [
  '''^CHANGELOG\.md$''',
  '''^README\.md$''',
  '''^ROADMAP\.md$''',
  '''^SUPPORT\.md$''',
  '''^CONTRIBUTING\.md$'''
]

regexes = [
  '''AKIAIOSFODNN7EXAMPLE''',
  '''example(_|-)?token''',
  '''VSCE_PAT''',
  '''OVSX_PAT'''
]
